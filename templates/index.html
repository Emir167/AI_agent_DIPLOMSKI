{% extends "base.html" %}

{% block title %}General Chat - Study Buddy{% endblock %}

{% block header_title %}General Chat{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto flex flex-col h-full">
    <div id="chat-messages" class="flex-1 overflow-y-auto mb-4 p-4 bg-white rounded-lg shadow space-y-4">
        <div class="chat-message flex">
            <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white flex-shrink-0 mr-3">
                <span class="material-icons">smart_toy</span>
            </div>
            <div class="message-content bg-blue-100 p-3 rounded-lg max-w-3xl">
                <p>Zdravo! Ja sam tvoj Study Buddy🤖. Kako ti mogu pomoci danas?</p>
            </div>
        </div>
    </div>

    <div class="bg-white p-4 rounded-lg shadow">
        <form id="chat-form" class="flex items-end">
            <textarea id="user-input" class="flex-1 border rounded-lg resize-none p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 min-h-[50px]" placeholder="Otkucajte Vasu poruku ovde..." rows="2"></textarea>
            <button type="submit" class="ml-2 bg-blue-500 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600 transition-colors">
                <span class="material-icons">send</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
