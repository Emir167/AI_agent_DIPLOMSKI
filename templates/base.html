<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Study Planner{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <div class="flex flex-1">
        <aside id="sidebar" class="bg-blue-900 text-white w-64 flex-shrink-0 transform transition-all duration-300 ease-in-out overflow-y-auto">
            <div class="p-4">
                <h1 class="text-2xl font-bold mb-8">AI Study Buddy</h1>
                <nav>
                    <ul>
                        <li class="mb-3">
                            <a href="{{ url_for('index') }}" class="flex items-center p-2 rounded-md hover:bg-blue-700 transition-colors {% if request.path == url_for('index') %}bg-blue-700{% endif %}">
                                <span class="material-icons mr-3">chat</span>
                                <span>General Chat</span>
                            </a>
                        </li>
                        <li class="mb-3">
                            <a href="{{ url_for('subjects_list') }}" class="flex items-center p-2 rounded-md hover:bg-blue-700 transition-colors {% if '/predmet' in request.path %}bg-blue-700{% endif %}">
                                <span class="material-icons mr-3">book</span>
                                <span>Predmeti</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm z-10">
                <div class="flex items-center p-4">
                    <button id="sidebar-toggle" class="p-1 mr-4 rounded-full hover:bg-gray-200 focus:outline-none">
                        <span class="material-icons">menu</span>
                    </button>
                    <h2 class="text-xl font-semibold">{% block header_title %}AI Study Planner{% endblock %}</h2>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
